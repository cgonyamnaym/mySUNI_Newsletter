<!doctype html><html lang="ko"><head><meta charset="utf-8"><title>Title Type · Pretendard</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px;background:var(--bg-base)}
  .wrap{display:flex;flex-direction:column;gap:20px;max-width:900px}
  .item{display:grid;grid-template-columns:150px 1fr;column-gap:24px;align-items:baseline}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--fg-alternative);line-height:1.4;padding-top:.3em}

  hr{border:0;border-top:1px solid var(--line-subtle);margin:0}
  .note{font-family:var(--font-mono);font-size:11px;color:var(--fg-alternative);margin:0 0 8px}
</style></head><body>
  <p class="note">Title · Pretendard (local OTF) · weight 700, tight tracking</p>
  <div class="wrap">
    <div class="item"><div class="meta"><b>Title XL</b>28 / 38 · -2.4%</div><div class="ds-title-xl">지원 현황을 확인해 보세요</div></div>
    <hr>
    <div class="item"><div class="meta"><b>Title LG</b>24 / 32 · -2.3%</div><div class="ds-title-lg">관심있는 포지션 모아보기</div></div>
    <hr>
    <div class="item"><div class="meta"><b>Title MD</b>20 / 28 · -1.0%</div><div class="ds-title-md">추천 포지션 · Weekly pick</div></div>
    <hr>
    <div class="item"><div class="meta"><b>Title SM</b>18 / 26 · 0</div><div class="ds-title-sm">당신을 위한 맞춤 콘텐츠</div></div>
  </div>
</body></html>
