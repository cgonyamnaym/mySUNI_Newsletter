<!doctype html><html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--bg-base);display:flex;gap:20px;flex-wrap:wrap}
  .s{display:flex;flex-direction:column;gap:8px;align-items:center}
  .sq{width:80px;height:80px;background:#0066FF;border:1px solid transparent}
  .n{font-family:var(--font-mono);font-size:11px;color:var(--fg-strong)}
  .v{font-family:var(--font-mono);font-size:10px;color:var(--fg-alternative)}
</style></head><body>
  <div class="s"><div class="sq" style="border-radius:4px"></div><div class="n">xs</div><div class="v">4px</div></div>
  <div class="s"><div class="sq" style="border-radius:8px"></div><div class="n">sm</div><div class="v">8px</div></div>
  <div class="s"><div class="sq" style="border-radius:12px"></div><div class="n">md</div><div class="v">12px</div></div>
  <div class="s"><div class="sq" style="border-radius:16px"></div><div class="n">lg</div><div class="v">16px</div></div>
  <div class="s"><div class="sq" style="border-radius:24px"></div><div class="n">xl</div><div class="v">24px</div></div>
  <div class="s"><div class="sq" style="border-radius:32px"></div><div class="n">2xl</div><div class="v">32px</div></div>
  <div class="s"><div class="sq" style="border-radius:9999px"></div><div class="n">full</div><div class="v">pill</div></div>
</body></html>
