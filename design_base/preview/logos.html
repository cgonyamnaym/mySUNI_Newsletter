<!doctype html><html><head><meta charset="utf-8"><title>Logos</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--bg-base)}
  .row{display:flex;align-items:center;gap:32px;flex-wrap:wrap}
  .tile{display:flex;flex-direction:column;gap:10px;align-items:flex-start}
  .tile img{height:36px;width:auto;object-fit:contain}
  .tile .cap{font:500 11px/1 var(--font-sans);letter-spacing:.031em;color:var(--fg-alternative);text-transform:uppercase}
  .sym{display:flex;align-items:center;gap:16px}
  .sym img{height:48px}
</style></head>
<body>
  <div class="row">
    <div class="tile"><img src="../assets/logos/wanted-symbol.svg" alt="symbol"><span class="cap">Symbol</span></div>
    <div class="tile"><img src="../assets/logos/wanted-logotype.svg" alt="logotype"><span class="cap">Logotype</span></div>
    <div class="tile"><img src="../assets/logos/wanted-oneid-horizontal.svg" alt="oneid"><span class="cap">Wanted OneID</span></div>
    <div class="tile"><img src="../assets/logos/laas-logotype.svg" alt="laas"><span class="cap">LaaS</span></div>
  </div>
</body></html>
