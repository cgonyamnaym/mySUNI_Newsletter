<!doctype html><html><head><meta charset="utf-8"><title>Spacing Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--bg-base);display:flex;flex-direction:column;gap:10px}
  .row{display:grid;grid-template-columns:68px 64px 1fr;align-items:center;gap:16px}
  .tok{font-family:var(--font-mono);font-size:12px;color:var(--fg-strong)}
  .val{font-family:var(--font-mono);font-size:11px;color:var(--fg-alternative)}
  .bar{height:12px;background:#0066FF;border-radius:4px}
</style></head><body>
  <div class="row"><div class="tok">space-2</div><div class="val">4px</div><div class="bar" style="width:4px"></div></div>
  <div class="row"><div class="tok">space-3</div><div class="val">8px</div><div class="bar" style="width:8px"></div></div>
  <div class="row"><div class="tok">space-4</div><div class="val">12px</div><div class="bar" style="width:12px"></div></div>
  <div class="row"><div class="tok">space-5</div><div class="val">16px</div><div class="bar" style="width:16px"></div></div>
  <div class="row"><div class="tok">space-7</div><div class="val">24px</div><div class="bar" style="width:24px"></div></div>
  <div class="row"><div class="tok">space-8</div><div class="val">32px</div><div class="bar" style="width:32px"></div></div>
  <div class="row"><div class="tok">space-9</div><div class="val">48px</div><div class="bar" style="width:48px"></div></div>
  <div class="row"><div class="tok">space-10</div><div class="val">64px</div><div class="bar" style="width:64px"></div></div>
  <div class="row"><div class="tok">space-11</div><div class="val">96px</div><div class="bar" style="width:96px"></div></div>
  <div class="row"><div class="tok">space-12</div><div class="val">128px</div><div class="bar" style="width:128px"></div></div>
</body></html>
