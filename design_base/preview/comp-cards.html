<!doctype html><html><head><meta charset="utf-8"><title>Cards</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--bg-subtle);display:flex;gap:16px;flex-wrap:wrap}
  .card{background:#fff;border:1px solid rgba(112,115,124,.16);border-radius:16px;padding:18px;width:260px;display:flex;flex-direction:column;gap:10px}
  .card.elev{border-color:transparent;box-shadow:0 12px 32px rgba(23,23,23,.10)}
  .card.flush{padding:0;overflow:hidden}
  .thumb{height:120px;background:linear-gradient(135deg,#EAF2FE,#DFEBFD);display:flex;align-items:center;justify-content:center;color:#0066FF;font:700 24px/1 var(--font-sans)}
  .co{display:flex;align-items:center;gap:10px}
  .logo{width:36px;height:36px;border-radius:10px;background:#171719;color:#fff;display:flex;align-items:center;justify-content:center;font:700 14px/1 var(--font-sans)}
  h4{margin:0;font:700 17px/1.3 var(--font-sans);color:#000;letter-spacing:-.01em}
  .meta{font:500 12px/1 var(--font-sans);color:rgba(55,56,60,.61);letter-spacing:.025em}
  .tags{display:flex;gap:6px;flex-wrap:wrap}
  .t{font:700 11px/1 var(--font-sans);letter-spacing:.031em;padding:4px 8px;background:#F4F4F5;border-radius:6px;color:#37383C}
</style></head><body>
  <div class="card">
    <div class="co"><div class="logo">W</div><div class="meta">원티드랩 · 서울</div></div>
    <h4>프로덕트 디자이너 (시니어)</h4>
    <div class="tags"><span class="t">정규직</span><span class="t">경력 5년+</span></div>
  </div>
  <div class="card elev">
    <div class="co"><div class="logo" style="background:#0066FF">K</div><div class="meta">카카오 · 판교</div></div>
    <h4>iOS 개발자</h4>
    <div class="tags"><span class="t">합격률 높음</span><span class="t">재택 가능</span></div>
  </div>
  <div class="card flush">
    <div class="thumb">Wanted+</div>
    <div style="padding:16px;display:flex;flex-direction:column;gap:6px">
      <h4>Weekly Pick</h4>
      <div class="meta">에디터가 고른 이번 주 포지션</div>
    </div>
  </div>
</body></html>
