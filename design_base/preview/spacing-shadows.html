<!doctype html><html><head><meta charset="utf-8"><title>Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px;background:var(--bg-subtle);display:flex;gap:28px;flex-wrap:wrap}
  .s{display:flex;flex-direction:column;gap:10px;align-items:center}
  .sq{width:96px;height:96px;background:#fff;border-radius:16px}
  .n{font-family:var(--font-mono);font-size:11px;color:var(--fg-strong)}
  .v{font-family:var(--font-mono);font-size:10px;color:var(--fg-alternative)}
</style></head><body>
  <div class="s"><div class="sq" style="box-shadow:var(--shadow-xs)"></div><div class="n">xs</div><div class="v">0 1 2 / 6%</div></div>
  <div class="s"><div class="sq" style="box-shadow:var(--shadow-sm)"></div><div class="n">sm</div><div class="v">0 2 6 / 7%</div></div>
  <div class="s"><div class="sq" style="box-shadow:var(--shadow-md)"></div><div class="n">md</div><div class="v">0 4 16 / 8%</div></div>
  <div class="s"><div class="sq" style="box-shadow:var(--shadow-lg)"></div><div class="n">lg</div><div class="v">0 12 32 / 10%</div></div>
  <div class="s"><div class="sq" style="box-shadow:var(--shadow-xl)"></div><div class="n">xl</div><div class="v">0 24 48 / 12%</div></div>
</body></html>
