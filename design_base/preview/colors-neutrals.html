<!doctype html><html><head><meta charset="utf-8"><title>Neutral Ramp</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--bg-base);display:flex;gap:8px;flex-wrap:wrap}
  .s{display:flex;flex-direction:column;gap:6px;min-width:84px}
  .sw{height:72px;border-radius:var(--radius-md);border:1px solid var(--line-subtle)}
  .n{font:700 12px/1 var(--font-sans);color:var(--fg-strong);letter-spacing:.025em}
  .h{font-family:var(--font-mono);font-size:10px;color:var(--fg-alternative)}
</style></head><body>
  <div class="s"><div class="sw" style="background:#F7F7F8"></div><div class="n">Gray 50</div><div class="h">#F7F7F8</div></div>
  <div class="s"><div class="sw" style="background:#F4F4F5"></div><div class="n">Gray 100</div><div class="h">#F4F4F5</div></div>
  <div class="s"><div class="sw" style="background:#DBDCDF"></div><div class="n">Gray 200</div><div class="h">#DBDCDF</div></div>
  <div class="s"><div class="sw" style="background:#C2C4C8"></div><div class="n">Gray 300</div><div class="h">#C2C4C8</div></div>
  <div class="s"><div class="sw" style="background:#AEB0B6"></div><div class="n">Gray 400</div><div class="h">#AEB0B6</div></div>
  <div class="s"><div class="sw" style="background:#989BA2"></div><div class="n">Gray 500</div><div class="h">#989BA2</div></div>
  <div class="s"><div class="sw" style="background:#70737C"></div><div class="n">Gray 600</div><div class="h">#70737C</div></div>
  <div class="s"><div class="sw" style="background:#37383C"></div><div class="n">Gray 700</div><div class="h">#37383C</div></div>
  <div class="s"><div class="sw" style="background:#2E2F33"></div><div class="n">Gray 800</div><div class="h">#2E2F33</div></div>
  <div class="s"><div class="sw" style="background:#1B1C1E"></div><div class="n">Gray 900</div><div class="h">#1B1C1E</div></div>
</body></html>
