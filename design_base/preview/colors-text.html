<!doctype html><html><head><meta charset="utf-8"><title>Text Colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--bg-base);display:flex;flex-direction:column;gap:14px}
  .row{display:flex;align-items:baseline;gap:20px}
  .spec{font:700 20px/1.3 var(--font-sans);letter-spacing:-.01em;min-width:380px}
  .tag{font-family:var(--font-mono);font-size:11px;color:var(--fg-alternative)}
</style></head><body>
  <div class="row"><div class="spec" style="color:#000">fg-strong — 헤드라인용 텍스트</div><div class="tag">rgb(0,0,0)</div></div>
  <div class="row"><div class="spec" style="color:#171719">fg-normal — 본문 텍스트</div><div class="tag">rgb(23,23,25)</div></div>
  <div class="row"><div class="spec" style="color:rgba(46,47,51,.88)">fg-neutral — 보조 텍스트</div><div class="tag">2E2F33 88%</div></div>
  <div class="row"><div class="spec" style="color:rgba(55,56,60,.61)">fg-alternative — 캡션</div><div class="tag">37383C 61%</div></div>
  <div class="row"><div class="spec" style="color:rgba(55,56,60,.28)">fg-assistive — 플레이스홀더</div><div class="tag">37383C 28%</div></div>
</body></html>
