<!doctype html><html><head><meta charset="utf-8"><title>Semantic Colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--bg-base);display:flex;gap:16px;flex-wrap:wrap}
  .s{display:flex;flex-direction:column;gap:8px;min-width:140px}
  .sw{height:72px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font:700 14px/1 var(--font-sans);letter-spacing:.015em}
  .n{font:700 13px/1 var(--font-sans);color:var(--fg-strong)}
  .h{font-family:var(--font-mono);font-size:11px;color:var(--fg-alternative)}
</style></head><body>
  <div class="s"><div class="sw" style="background:#0066FF;color:#fff">Primary</div><div class="n">Primary / Link</div><div class="h">#0066FF</div></div>
  <div class="s"><div class="sw" style="background:#FF4242;color:#fff">Danger</div><div class="n">Danger / Error</div><div class="h">#FF4242</div></div>
  <div class="s"><div class="sw" style="background:#00BF40;color:#fff">Success</div><div class="n">Success</div><div class="h">#00BF40</div></div>
  <div class="s"><div class="sw" style="background:#0098B2;color:#fff">Info</div><div class="n">Info</div><div class="h">#0098B2</div></div>
  <div class="s"><div class="sw" style="background:#9747FF;color:#fff">Accent</div><div class="n">Accent / Plus</div><div class="h">#9747FF</div></div>
  <div class="s"><div class="sw" style="background:#FFE812;color:#000">Kakao</div><div class="n">Kakao Yellow</div><div class="h">#FFE812</div></div>
</body></html>
