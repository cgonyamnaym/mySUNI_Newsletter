<!doctype html><html><head><meta charset="utf-8"><title>Brand Colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--bg-base);display:flex;gap:24px;flex-wrap:wrap}
  .s{display:flex;flex-direction:column;gap:10px;min-width:140px}
  .sw{height:88px;border-radius:var(--radius-lg);border:1px solid var(--line-subtle)}

  <div class="s"><div class="sw" style="background:#0066FF"></div><div class="n">Cobalt Blue</div><div class="h">#0066FF · Primary</div></div>
  <div class="s"><div class="sw" style="background:#005EEB"></div><div class="n">Cobalt Hover</div><div class="h">#005EEB</div></div>
  <div class="s"><div class="sw" style="background:#000000"></div><div class="n">Black</div><div class="h">#000000</div></div>
  <div class="s"><div class="sw" style="background:#FFFFFF"></div><div class="n">White</div><div class="h">#FFFFFF</div></div>
</body></html>
