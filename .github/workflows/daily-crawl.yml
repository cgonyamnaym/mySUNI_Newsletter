name: Daily News Crawl

on:
  schedule:
    # 매일 한국 시간 오전 6시 (UTC 기준 전날 오후 9시)에 실행
    - cron: '0 21 * * *'
  workflow_dispatch: # GitHub 웹에서 수동으로도 실행 가능하도록 설정

concurrency:
  group: daily-crawl
  cancel-in-progress: true

jobs:
  crawl-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: 의존성 패키지 설치
        run: npm install

      - name: 크롤러 실행
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_INTERVAL_MS: '4000'
          GEMINI_CALL_TIMEOUT_MS: '20000'
          MAX_CRAWL_DAYS: '2'
        run: npm run crawl

      - name: 변경사항 커밋 및 푸시
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/ data/.crawled-urls.json

          # 변경된 사항이 있을 때만 커밋
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: 🤖 매일 뉴스 자동 업데이트" && git push)

      - name: Vercel 재배포 트리거
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK" ]; then
            curl -s -X POST "$VERCEL_DEPLOY_HOOK"
            echo "Vercel 재배포 요청 완료"
          else
            echo "VERCEL_DEPLOY_HOOK 미설정 — 스킵"
          fi
