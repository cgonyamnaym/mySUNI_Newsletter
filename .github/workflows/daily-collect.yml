name: Daily News Collection

# daily-crawl.yml과 중복 — 비활성화
# 크롤링은 daily-crawl.yml (UTC 21:00, KST 06:00) 단일 워크플로우로 운영
on:
  workflow_dispatch: # 수동 실행만 허용 (스케줄 비활성화)

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Collect news
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/run-crawl.js

      - name: Commit & push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/ data/
          git diff --staged --quiet || git commit -m "chore: daily news $(date +%Y-%m-%d)"
          git push
